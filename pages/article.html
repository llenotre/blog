<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>{article.title} - Luc Lenôtre</title>
		<meta name="description" content="{article.description}" />
		<link rel="canonical" href="{article.url}" />
		<meta name="theme-color" content="#14161b" />
		<link rel="icon" href="https://gateway.maestro-os.org/avatar" />
		<link href="https://blog.lenot.re/rss" rel="alternate" type="application/rss+xml" title="Maestro blog RSS" />
		<link rel="preconnect" href="https://gateway.maestro-os.org" crossorigin />
		<link rel="preload" href="/assets/font/source-sans-3-300.woff2" as="font" type="font/woff2" crossorigin />
		<link href="/assets/css/style.min.css" rel="stylesheet" />
		<link href="/assets/css/all.min.css" rel="stylesheet" />
		<link href="/assets/css/github-dark.min.css" rel="stylesheet" />
		<meta property="og:type" content="article" />
		<meta property="og:site_name" content="Luc Lenôtre" />
		<meta property="og:locale" content="en_US" />
		<meta property="og:url" content="{article.url}" />
		<meta property="og:title" content="{article.title}" />
		<meta property="og:description" content="{article.description}" />
		<meta property="og:image" content="{article.cover_url}" />
		<meta property="og:image:alt" content="{article.title}" />
		<meta property="article:published_time" content="{article.date}" />
		<meta property="article:author" content="Luc Lenôtre" />
		<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@type": "BlogPosting",
			"headline": "{article.title}",
			"description": "{article.description}",
			"image": "{article.cover_url}",
			"datePublished": "{article.date}",
			"dateModified": "{article.date}",
			"inLanguage": "en",
			"url": "{article.url}",
			"mainEntityOfPage": {
				"@type": "WebPage",
				"@id": "{article.url}"
			},
			"author": {
				"@type": "Person",
				"name": "Luc Lenôtre",
				"url": "https://blog.lenot.re/bio",
				"sameAs": ["https://github.com/llenotre"]
			},
			"publisher": {
				"@type": "Person",
				"name": "Luc Lenôtre",
				"url": "https://blog.lenot.re/"
			}
		}
		</script>
	</head>
	<body class="article">
		<div class="background">
			<div class="blob"></div>
			<div class="blob blob-right"></div>
		</div>
		<div class="article-content">
			<nav class="fixed-buttons" aria-label="Back">
				<a class="fixed-button" href="/" title="Main page" aria-label="Back to home"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i></a>
			</nav>
			<main class="content">
				<article>
					<div class="section article-header">
						<h1>{article.title}</h1>
						<p class="date"><time id="date-long" datetime="{article.date}">{article.date}</time></p>
						<p>
							{article.description}
						</p>
						<img class="cover" src="{article.cover_url}" alt="{article.title}" fetchpriority="high" decoding="async">
					</div>
					<div class="section">
						{article.content}
					</div>
				</article>
				<div class="section spaced split">
					<div class="split-half social">
						<p>Stay in touch! 📣</p>
						<ul class="social">
							<li><a href="https://github.com/llenotre" target="_blank" title="My Github" aria-label="My Github"><i class="fa-brands fa-github" aria-hidden="true"></i></a></li>
							<li><a href="{discord}" target="_blank" title="Discord Server" aria-label="Discord Server"><i class="fa-brands fa-discord" aria-hidden="true"></i></a></li>
							<li><a href="/rss" title="RSS Feed" aria-label="RSS Feed"><i class="fa-solid fa-square-rss" aria-hidden="true"></i></a></li>
						</ul>
						<p>Contact me: <a href="mailto:blog@lenot.re"><b>blog@lenot.re</b></a></p>
					</div>
					<div class="split-half social right">
						<p>Like my work? Share it! ❤️</p>
						<ul class="social">
							<li><a id="article-link" onclick="clipboard()" title="Copy link" aria-label="Copy link"><i class="fa-solid fa-link" aria-hidden="true"></i></a></li>
							<li><a href="https://bsky.app/intent/compose?text={article.url}" target="_blank" title="Share on Bluesky" aria-label="Share on Bluesky"><i class="fa-brands fa-bluesky" aria-hidden="true"></i></a></li>
							<li><a href="https://www.reddit.com/submit?title={article.title}&url={article.url}" target="_blank" title="Share on Reddit" aria-label="Share on Reddit"><i class="fa-brands fa-reddit" aria-hidden="true"></i></a></li>
							<li><a href="https://www.linkedin.com/sharing/share-offsite/?url={article.url}" target="_blank" title="Share on LinkedIn" aria-label="Share on LinkedIn"><i class="fa-brands fa-linkedin" aria-hidden="true"></i></a></li>
							<li><a href="https://www.facebook.com/sharer/sharer.php?u={article.url}" target="_blank" title="Share on Facebook" aria-label="Share on Facebook"><i class="fa-brands fa-facebook" aria-hidden="true"></i></a></li>
						</ul>
					</div>
				</div>
			</main>
		</div>
		<script src="/assets/js/dayjs.min.js"></script>
		<script src="/assets/js/date.min.js"></script>
		<script src="/assets/js/highlight.min.js"></script>
		<script>hljs.highlightAll();</script>
		<script>
			function clipboard() {
				navigator.clipboard.writeText("{article.url}");
				let button = document.getElementById("article-link");
				button.innerHTML = "<i class=\"fa-solid fa-check\"></i>";
				setTimeout(() => {
					button.innerHTML = "<i class=\"fa-solid fa-link\"></i>";
				}, 1000);
			}
		</script>
	</body>
</html>
